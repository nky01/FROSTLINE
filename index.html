<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROSTLINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="#">
            <img src="images/FROSTLINE.png" width="200px" alt="
            FROSTLINE Logo" title="FROSTLINE">
        </a>
    </header>
    <div></div>
    <nav>
        <ul style="font-weight: bold;">
            <li><a href="#inicio">INICIO</a></li>
            <li><a href="#productos">PRODUCTOS</a></li>
            <li><a href="#contact-us">CONTACTO</a></li>
        </ul>
    </nav>
    <main>
        <div id="inicio">
            <h1 class="main-title">FROSTLINE</h1>
            <div class="image"></div>
        </div>
        <div id="productos">
            <h2>Productos</h2>
            <div class="productos-img">
                <img src="products/glasses-1.avif" alt="glasses-1">
                <img src="products/glasses-2.avif" alt="glasses-2">
                <img src="products/glasses-3.avif" alt="glasses-3">
                <img src="products/jacket-1.avif" alt="jacket-1">
                <img src="products/jacket-2.avif" alt="jacket-2">
                <img src="products/jacket-3.avif" alt="jacket-3">
                <img src="products/tabla-snow-1.png" alt="tabla-snow-1">
                <img src="products/tabla-snow-2.png" alt="tabla-snow-2">
                <img src="products/tabla-snow-3.webp" alt="tabla-snow-3">
            </div>
        </div>

        <video src="videos/video.mp4" controls poster="images/portada_video.jpg" width="400px" height="310px"></video>
    </main>

    <footer>
        <div class="card frostline-card">

            <a href="#"><img src="images/isotipo.png" width="200px"></a>
            <p>Frostline te acompaña en cada movimiento. Ropa deportiva y skateboarding pensada para tu día a día, con comodidad, estilo y resistencia en cada paso.</p>

            <div class="social-icons">
                <a href="#"><img src="icons/X_logo.png" alt=""></a>
                <a href="#"><img src="icons/linkedin_logo.png" alt=""></a>
                <a href="#"><img src="icons/instagram_logo.png" alt=""></a>
            </div>
        </div>   
        
        <div class="card quick-links">
            <h4>Quick links</h4>
        </div>

        <div class="card contact-us" id="contact-us">
            <h4>Contact us</h4>
        </div>
    </footer>
</body>
</html>
